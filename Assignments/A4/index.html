<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/A4/" />
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- ========== HEADER ========== -->
    <header class="header">
      <h1 class="header__title">&#9989; My Todo List</h1>
      <p class="header__subtitle">Tasks persist after page reload via localStorage</p>
    </header>

    <main class="main">

      <!-- ========== INPUT AREA ========== -->
      <section class="input-section">
        <form class="input-section__form" id="todoForm" novalidate>
          <input
            class="input-section__field"
            type="text"
            id="todoInput"
            placeholder="Add a new task..."
            autocomplete="off"
          />
          <button class="btn btn--primary" type="submit" id="addBtn">
            Add Task
          </button>
        </form>

        <!-- Filter buttons -->
        <div class="filters" id="filters">
          <button class="filters__btn filters__btn--active" data-filter="all">All</button>
          <button class="filters__btn" data-filter="active">Active</button>
          <button class="filters__btn" data-filter="completed">Completed</button>
        </div>
      </section>

      <!-- ========== TASK LIST ========== -->
      <section class="list-section">
        <ul class="todo-list" id="todoList"></ul>

        <!-- Empty state shown when no tasks match the filter -->
        <div class="empty-state" id="emptyState">
          <span class="empty-state__icon">&#128203;</span>
          <p class="empty-state__text">No tasks here. Add one above!</p>
        </div>
      </section>

      <!-- ========== FOOTER STATS ========== -->
      <footer class="stats" id="stats">
        <span class="stats__count" id="statsCount">0 tasks left</span>
        <button class="btn btn--danger btn--sm" id="clearBtn">
          Clear Completed
        </button>
      </footer>

    </main>

    <!-- ========== FOOTER ========== -->
    <footer class="footer">
      <div class="footer__inner">
        <span class="footer__logo">SIMARJOT SINGH</span>
        <p class="footer__copy">Built to fulfill GeeksforGeeks Assignment-4 Requirements</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
